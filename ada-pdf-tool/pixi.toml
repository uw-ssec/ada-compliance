[workspace]
authors = ["Ishika Johari <ishijohari@gmail.com>"]
channels = ["conda-forge"]
name = "ada-pdf-tool"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
app = "streamlit run app.py"
extract = "python test_extraction.py"
bookmarks = "python test_bookmarks.py"
test = "pytest tests/"
eval = "pytest tests/eval/"
smoke = "python -c \"import docling; import pikepdf; print('OK')\""
rebuild = "python -c 'from core.rebuilder import rebuild_as_docx; print(\"OK\")'"

[dependencies]
python = ">=3.14.4,<3.15"
pikepdf = ">=9.0.0,<10"

[pypi-dependencies]
docling = ">=2.93.0, <3"
python-docx = ">=1.2.0, <2"
streamlit = ">=1.57.0, <2"
anthropic = ">=0.101.0, <0.102"
openai = ">=2.36.0, <3"
pandas = ">=3.0.3, <4"
pytest = ">=9.0.3, <10"
python-dotenv = ">=1.0.0, <2"
pymupdf = ">=1.24.0, <2"
pillow = ">=10.0.0"
